.h{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2.5px solid #2A1B11;padding-bottom:12px;margin-bottom:14px}
.brand{display:flex;gap:12px;align-items:center}
.cup{width:44px;height:44px;border-radius:12px;background:#2A1B11;color:#E6D8C2;display:grid;place-items:center;font-size:23px}
.brand h1{font-family:'Fraunces',Georgia,serif;font-size:23px;margin:0;color:#2A1B11;font-weight:600}
.brand p{margin:2px 0 0;font-size:11.5px;color:#5A4231;font-weight:500}
.docttl{text-align:right}.docttl .t{font-family:'Fraunces',Georgia,serif;font-size:18px;color:#2A1B11;font-weight:700}
.docttl .n{font-size:10.5px;color:#8C7860;margin-top:3px}
.meta{display:grid;grid-template-columns:repeat(2,1fr);gap:7px 26px;border:1px solid #E6D8C2;border-radius:12px;padding:13px 16px;margin-bottom:14px;font-size:12.5px}
.meta div{display:flex;justify-content:space-between;gap:10px;border-bottom:1px dashed #EFE5D4;padding-bottom:5px}
.meta span{color:#8C7860;font-weight:600}.meta b{color:#2A1B11}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#2A1B11;color:#F4ECDF;padding:8px 6px;text-transform:uppercase;letter-spacing:.03em;font-size:9.5px;font-weight:600;text-align:center}
th.pl{text-align:left}
td{padding:7px 6px;border-bottom:.5px solid #EFE5D4;font-variant-numeric:tabular-nums}
td.c{text-align:center}.pl{text-align:left}td.pl{color:#3A2A1D;font-weight:500}td.bx{font-weight:700;color:#2A1B11}
tr:nth-child(even) td{background:#FBF7F0}
tfoot td{background:#F4ECDF!important;font-weight:700;color:#2A1B11;border-top:2px solid #2A1B11;font-size:12px}
.sig{display:flex;gap:34px;margin-top:38px}
.sig .box{flex:1}.sig .lbl{font-size:11px;color:#5A4231;font-weight:700;margin-bottom:34px;display:block}
.sig .ln{border-top:1.3px solid #2A1B11}.sig .cap{font-size:10px;color:#8C7860;margin-top:5px;display:block}
.foot{margin-top:22px;font-size:9.5px;color:#8C7860;text-align:center;border-top:.5px solid #E6D8C2;padding-top:9px}
.note{background:#F4ECDF;border:1px solid #E6D8C2;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:#5A4231}
@media print{.note{display:none}body{margin:0}}
