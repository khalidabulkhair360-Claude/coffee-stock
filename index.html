    .submit { border:none; color:#fff; font-family:var(--font-b); font-weight:700; font-size:14px; padding:13px 18px; border-radius:13px; display:inline-flex; align-items:center; gap:6px; cursor:pointer; box-shadow:var(--shadow); }
    .submit:active { transform:scale(.97); }
    .err { display:flex; align-items:center; gap:6px; color:var(--clay); font-size:12.5px; font-weight:600; margin-top:10px; background:rgba(176,83,47,.08); padding:9px 11px; border-radius:10px; }
    .preview { margin-top:11px; font-size:13px; color:var(--mocha); } .preview strong { color:var(--espresso); font-family:var(--font-d); }

    .recent { display:flex; flex-direction:column; gap:7px; }
    .recrow { display:flex; align-items:center; gap:10px; padding:8px 4px; border-bottom:1px solid var(--latte-2); }
    .recrow:last-child{border:none}
    .rec-ic { width:28px; height:28px; border-radius:8px; background:var(--paper2); display:grid; place-items:center; flex-shrink:0; }
    .rec-main { flex:1; min-width:0; } .rec-main b { display:block; font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rec-main em { font-size:10.5px; color:var(--ink-soft); font-style:normal; }
    .rec-qty { font-family:var(--font-d); font-weight:600; font-size:15px; font-variant-numeric:tabular-nums; }
    .undo { border:none; background:var(--latte-2); width:28px; height:28px; border-radius:8px; display:grid; place-items:center; color:var(--mocha); cursor:pointer; flex-shrink:0; }

    .filters { display:flex; flex-direction:column; gap:8px; margin-top:11px; }
    .chips { display:flex; gap:6px; flex-wrap:wrap; }
    .chips button { border:1px solid var(--latte); background:var(--paper2); color:var(--mocha); font-family:var(--font-b); font-weight:600; font-size:11.5px; padding:6px 11px; border-radius:9px; cursor:pointer; }
    .chips button.on { background:var(--caramel); border-color:var(--caramel); color:#fff; }
    .sortrow { display:flex; align-items:center; justify-content:space-between; margin-top:11px; font-size:11.5px; color:var(--ink-soft); font-weight:600; }
    .sortrow > span { display:flex; align-items:center; gap:5px; }
    .sortsel { display:flex; gap:3px; background:var(--latte-2); border-radius:9px; padding:3px; }
    .sortsel button { border:none; background:none; font-family:var(--font-b); font-size:11px; font-weight:600; color:var(--mocha); padding:4px 9px; border-radius:7px; cursor:pointer; }
    .sortsel button.on { background:var(--espresso); color:var(--latte); }

    .itemlist { display:flex; flex-direction:column; gap:9px; }
    .itemrow { background:var(--paper); border:1px solid var(--latte); border-radius:14px; padding:13px; box-shadow:var(--shadow); cursor:pointer; }
    .ir-top { display:flex; align-items:center; justify-content:space-between; }
    .ir-id { font-size:11px; font-weight:700; color:var(--caramel-d); letter-spacing:.02em; }
    .badge { font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; letter-spacing:.03em; }
    .b-ok{background:rgba(110,129,88,.16); color:var(--sage)} .b-low{background:rgba(216,154,60,.18); color:var(--amber-d)}
    .b-out{background:rgba(176,83,47,.14); color:var(--clay)} .b-inactive{background:var(--latte-2); color:var(--ink-soft)}
    .ir-name { font-size:14px; font-weight:500; margin:7px 0; color:var(--ink); line-height:1.35; }
    .ir-bot { display:flex; align-items:baseline; justify-content:space-between; }
    .ir-bal { font-family:var(--font-d); font-size:19px; font-weight:600; color:var(--espresso); font-variant-numeric:tabular-nums; } .ir-bal em { font-size:11px; color:var(--ink-soft); font-style:normal; margin-left:4px; }
    .ir-cat { font-size:11px; color:var(--ink-soft); font-weight:600; }
    .ir-detail { margin-top:12px; padding-top:12px; border-top:1px dashed var(--latte); display:grid; grid-template-columns:1fr 1fr; gap:8px 14px; }
    .mv { display:flex; align-items:center; gap:7px; font-size:12px; } .mv span { width:8px; height:8px; border-radius:50%; flex-shrink:0; } .mv em { color:var(--ink-soft); font-style:normal; flex:1; } .mv b { font-variant-numeric:tabular-nums; color:var(--ink); }
    .md-open { grid-column:1/-1; font-size:12px; color:var(--ink-soft); margin-top:2px; } .md-open b { color:var(--mocha); }
    .more { text-align:center; color:var(--ink-soft); font-size:12px; padding:14px; }

    .scope, .rep-summary, .export-btns, .export-btns .exp { font-family:var(--font-b); }
    .scope { display:flex; gap:6px; margin-bottom:13px; flex-wrap:wrap; }
    .scope button { flex:1; min-width:90px; border:1.5px solid var(--latte); background:var(--paper2); color:var(--mocha); font-weight:600; font-size:12px; padding:9px; border-radius:11px; cursor:pointer; }
    .scope button.on { background:var(--espresso); color:var(--latte); border-color:var(--espresso); }
    .rep-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
    .rep-summary > div { background:var(--paper2); border:1px solid var(--latte); border-radius:11px; padding:9px; text-align:center; }
    .rep-summary span { display:block; font-size:10.5px; color:var(--ink-soft); font-weight:600; } .rep-summary b { font-family:var(--font-d); font-size:18px; color:var(--espresso); font-variant-numeric:tabular-nums; }
    .export-btns { display:flex; gap:10px; }
    .exp { flex:1; border:none; font-weight:700; font-size:13.5px; padding:14px; border-radius:13px; display:inline-flex; align-items:center; justify-content:center; gap:7px; cursor:pointer; box-shadow:var(--shadow); }
    .exp.xls { background:var(--sage); color:#fff; } .exp.pdf { background:var(--espresso); color:var(--latte); }
    .exp:active { transform:scale(.98); } .exp:disabled { opacity:.6; }
    .card.danger { border-color:rgba(176,83,47,.3); }
    .reset { border:1.5px solid var(--clay); background:none; color:var(--clay); font-family:var(--font-b); font-weight:700; font-size:13px; padding:11px 14px; border-radius:12px; display:inline-flex; align-items:center; gap:7px; cursor:pointer; }
    .confirm-box p { display:flex; align-items:flex-start; gap:7px; font-size:12.5px; color:var(--clay); line-height:1.5; margin:0 0 12px; }
    .confirm-box p svg { flex-shrink:0; margin-top:2px; }
    .confirm-btns { display:flex; gap:9px; }
    .cf-cancel { flex:1; border:1.5px solid var(--latte); background:var(--paper2); color:var(--mocha); font-family:var(--font-b); font-weight:600; font-size:13px; padding:11px; border-radius:11px; cursor:pointer; }
    .cf-yes { flex:1; border:none; background:var(--clay); color:#fff; font-family:var(--font-b); font-weight:700; font-size:13px; padding:11px; border-radius:11px; display:inline-flex; align-items:center; justify-content:center; gap:6px; cursor:pointer; }

    .nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:560px; display:flex; background:var(--paper); border-top:1px solid var(--latte); padding:7px 8px calc(7px + env(safe-area-inset-bottom)); z-index:30; box-shadow:0 -4px 20px rgba(42,27,17,.06); }
    .navbtn { flex:1; border:none; background:none; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0; color:var(--ink-soft); font-family:var(--font-b); font-size:10.5px; font-weight:600; cursor:pointer; border-radius:10px; transition:color .15s; }
    .navbtn.on { color:var(--espresso); } .navbtn.on svg { color:var(--caramel); }

    .toast { position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:var(--espresso); color:#fff; padding:11px 16px; border-radius:13px; display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600; z-index:50; box-shadow:0 8px 30px rgba(42,27,17,.3); max-width:90%; animation:up .3s ease; }
    .toast.warn { background:var(--clay); }
    @keyframes up { from{opacity:0; transform:translate(-50%,12px)} to{opacity:1; transform:translate(-50%,0)} }

    /* ---- Print report ---- */
    .print-report { display:none; }
    @media print {
      @page { size:A4 landscape; margin:12mm; }
      .app > *:not(.content), .nav, .header, .toast { display:none !important; }
      body.printing .app .page > .card { display:none !important; }
      .print-report { display:block !important; font-family:var(--font-b); color:#1c1208; }
      .pr-head { display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid #2A1B11; padding-bottom:10px; margin-bottom:12px; }
      .pr-brand { display:flex; gap:10px; align-items:center; } .pr-cup { font-size:26px; }
      .pr-brand h1 { font-family:var(--font-d); font-size:22px; margin:0; color:#2A1B11; } .pr-brand p { margin:2px 0 0; font-size:11px; color:#5A4231; }
      .pr-meta { text-align:right; font-size:11px; color:#5A4231; font-weight:600; }
      .pr-kpis { display:flex; gap:18px; margin-bottom:14px; }
      .pr-kpis > div { display:flex; flex-direction:column; } .pr-kpis b { font-family:var(--font-d); font-size:20px; color:#2A1B11; } .pr-kpis span { font-size:10px; color:#5A4231; text-transform:uppercase; letter-spacing:.04em; }
      .pr-table { width:100%; border-collapse:collapse; font-size:9px; }
      .pr-table th { background:#2A1B11; color:#F4ECDF; padding:5px 4px; text-align:right; font-weight:600; }
      .pr-table th:nth-child(2){text-align:left} .pr-table td { padding:3.5px 4px; border-bottom:.5px solid #E6D8C2; text-align:right; }
      .pr-table td.pl { text-align:left; } .pr-table tr:nth-child(even) td { background:#FBF7F0; }
      .pst { font-weight:700; font-size:8px; } .pst-low{color:#A9741E} .pst-out{color:#B0532F} .pst-ok{color:#6E8158} .pst-inactive{color:#998}
      .pr-foot { margin-top:12px; font-size:9px; color:#8C7860; text-align:center; border-top:.5px solid #E6D8C2; padding-top:8px; }
    }
  `);
  }
  var __rootEl = document.getElementById("root");
  ReactDOM.createRoot(__rootEl).render(React.createElement(App));
})();

} catch (err) {
  var e = document.getElementById("boot-e");
  if (e) { e.style.display = "block"; e.textContent = "Error starting the app: " + (err && err.message ? err.message : err); }
  console.error(err);
}
</script>
